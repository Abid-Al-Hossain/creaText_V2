<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CreaText</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:      #0d1120;
        --surface: #161c2c;
        --ctrl:    #111827;
        --border:  rgba(255,255,255,.09);
        --accent:  #818cf8;
        --text:    #e2e8f0;
        --muted:   rgba(226,232,240,.5);
        --font:    system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      html, body { width: 280px; }

      body {
        background: var(--bg);
        color: var(--text);
        font: 13px/1.4 var(--font);
        border-radius: 16px;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* header strip */
      .popup-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        background: linear-gradient(135deg, rgba(67,56,202,.35), rgba(99,102,241,.15));
        border-bottom: 1px solid var(--border);
      }
      .popup-logo {
        width: 30px; height: 30px;
        border-radius: 9px;
        background: linear-gradient(135deg, #3730a3, #6366f1);
        display: flex; align-items: center; justify-content: center;
        font: 700 11px var(--font);
        color: #c7d2fe;
        letter-spacing: .5px;
        box-shadow: 0 3px 10px rgba(99,102,241,.5);
        flex-shrink: 0;
      }
      .popup-title-group { flex: 1; }
      .popup-title {
        font: 700 14px var(--font);
        color: var(--text);
        letter-spacing: .3px;
      }
      .popup-sub {
        font: 400 10px var(--font);
        color: var(--muted);
        margin-top: 1px;
      }

      /* toggle row */
      .popup-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      .popup-row-label {
        font: 500 12px var(--font);
        color: var(--muted);
      }

      /* Checkbox toggle pill */
      .toggle-pill { position: relative; display: inline-flex; }
      .toggle-pill input { position: absolute; opacity: 0; width: 0; height: 0; }
      .toggle-track {
        width: 38px; height: 22px;
        border-radius: 999px;
        background: var(--ctrl);
        border: 1px solid var(--border);
        cursor: pointer;
        position: relative;
        transition: background .2s, border-color .2s;
      }
      .toggle-track::after {
        content: '';
        position: absolute;
        top: 3px; left: 3px;
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--muted);
        transition: transform .2s, background .2s, box-shadow .2s;
      }
      .toggle-pill input:checked ~ .toggle-track {
        background: rgba(129,140,248,.2);
        border-color: rgba(129,140,248,.4);
      }
      .toggle-pill input:checked ~ .toggle-track::after {
        transform: translateX(16px);
        background: var(--accent);
        box-shadow: 0 0 6px rgba(129,140,248,.5);
      }

      /* action buttons */
      .popup-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      .popup-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 9px 8px;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        cursor: pointer;
        font: 500 12px var(--font);
        transition: background .15s, border-color .15s, box-shadow .15s;
      }
      .popup-btn:hover {
        background: rgba(129,140,248,.1);
        border-color: rgba(129,140,248,.3);
        box-shadow: 0 2px 10px rgba(129,140,248,.15);
      }
      .popup-btn svg { opacity: .75; }

      /* footer hint */
      .popup-hint {
        padding: 10px 16px;
        font: 400 11px var(--font);
        color: var(--muted);
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./popup.jsx"></script>
  </body>
</html>
